services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ../backend/generated:/app/generated
    depends_on:
      - mysql
      - redis
      - rabbitmq

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${PETMALL_MYSQL_DATABASE:-petmall}
      MYSQL_ROOT_PASSWORD: ${PETMALL_MYSQL_ROOT_PASSWORD:-change_me}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["python", "-m", "workers.knowledge_worker"]
    env_file:
      - ../backend/.env
    volumes:
      - ../backend/generated:/app/generated
    depends_on:
      - mysql
      - rabbitmq

volumes:
  mysql_data:
