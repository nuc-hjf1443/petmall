x-backend-env: &backend-env
  PETMALL_APP_NAME: ${PETMALL_APP_NAME:-PetMall}
  PETMALL_ENV: ${PETMALL_ENV:-development}
  PETMALL_DEBUG: ${PETMALL_DEBUG:-false}
  PETMALL_API_HOST: 0.0.0.0
  PETMALL_API_PORT: 8000
  PETMALL_PUBLIC_H5_URL: ${PETMALL_PUBLIC_H5_URL:-http://127.0.0.1:8080}
  PETMALL_CORS_ORIGINS: ${PETMALL_CORS_ORIGINS:-http://127.0.0.1:8080,http://localhost:8080}
  PETMALL_MYSQL_DB_URI: "${PETMALL_MYSQL_DB_URI:-mysql+aiomysql://root:${PETMALL_MYSQL_ROOT_PASSWORD:-change_me}@mysql:3306/${PETMALL_MYSQL_DATABASE:-petmall}?charset=utf8mb4}"
  PETMALL_REDIS_URL: ${PETMALL_REDIS_URL:-redis://redis:6379/0}
  PETMALL_RABBITMQ_URL: ${PETMALL_RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
  PETMALL_JWT_SECRET_KEY: ${PETMALL_JWT_SECRET_KEY:-change_me_in_deploy_env}
  PETMALL_JWT_ALGORITHM: ${PETMALL_JWT_ALGORITHM:-HS256}
  PETMALL_ACCESS_TOKEN_EXPIRE_MINUTES: ${PETMALL_ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
  PETMALL_GENERATED_ASSET_DIR: ${PETMALL_GENERATED_ASSET_DIR:-generated}
  PETMALL_VECTOR_STORE_DIR: ${PETMALL_VECTOR_STORE_DIR:-generated/private/vector_store}
  PETMALL_MAX_UPLOAD_SIZE_MB: ${PETMALL_MAX_UPLOAD_SIZE_MB:-20}
  PETMALL_LLM_PROVIDER: ${PETMALL_LLM_PROVIDER:-deepseek}
  PETMALL_LLM_MODEL: ${PETMALL_LLM_MODEL:-deepseek-chat}
  PETMALL_LLM_API_KEY: ${PETMALL_LLM_API_KEY:-}
  PETMALL_LLM_TEMPERATURE: ${PETMALL_LLM_TEMPERATURE:-0.2}
  PETMALL_AGENT_MEMORY_POSTGRES_DSN: ${PETMALL_AGENT_MEMORY_POSTGRES_DSN:-}
  PETMALL_AGENT_MEMORY_SETUP_ON_START: ${PETMALL_AGENT_MEMORY_SETUP_ON_START:-false}
  PETMALL_PAYMENT_MODE: ${PETMALL_PAYMENT_MODE:-mock}
  PETMALL_MOCK_PAYMENT_ENABLED: ${PETMALL_MOCK_PAYMENT_ENABLED:-true}
  PETMALL_ALIPAY_GATEWAY_URL: ${PETMALL_ALIPAY_GATEWAY_URL:-https://openapi-sandbox.dl.alipaydev.com/gateway.do}
  PETMALL_ALIPAY_APP_ID: ${PETMALL_ALIPAY_APP_ID:-}
  PETMALL_ALIPAY_PRIVATE_KEY: ${PETMALL_ALIPAY_PRIVATE_KEY:-}
  PETMALL_ALIPAY_PUBLIC_KEY: ${PETMALL_ALIPAY_PUBLIC_KEY:-}
  PETMALL_ALIPAY_SELLER_ID: ${PETMALL_ALIPAY_SELLER_ID:-}
  PETMALL_ALIPAY_NOTIFY_URL: ${PETMALL_ALIPAY_NOTIFY_URL:-http://127.0.0.1:8000/payments/alipay/notify}
  PETMALL_ALIPAY_RETURN_URL: ${PETMALL_ALIPAY_RETURN_URL:-http://127.0.0.1:8080/#/pages/payment/result}
  PETMALL_RAG_CHUNK_SIZE: ${PETMALL_RAG_CHUNK_SIZE:-800}
  PETMALL_RAG_CHUNK_OVERLAP: ${PETMALL_RAG_CHUNK_OVERLAP:-100}
  PETMALL_OLLAMA_BASE_URL: ${PETMALL_OLLAMA_BASE_URL:-http://ollama:11434}
  PETMALL_OLLAMA_EMBED_MODEL: ${PETMALL_OLLAMA_EMBED_MODEL:-nomic-embed-text}
  PETMALL_CHROMA_COLLECTION: ${PETMALL_CHROMA_COLLECTION:-petmall_knowledge}
  PETMALL_KNOWLEDGE_TASK_LEASE_SECONDS: ${PETMALL_KNOWLEDGE_TASK_LEASE_SECONDS:-900}
  PETMALL_SPUG_SMS_BASE_URL: ${PETMALL_SPUG_SMS_BASE_URL:-https://push.spug.cc}
  PETMALL_SPUG_SMS_TEMPLATE_ID: ${PETMALL_SPUG_SMS_TEMPLATE_ID:-}
  PETMALL_SPUG_SMS_TEMPLATE_NAME: ${PETMALL_SPUG_SMS_TEMPLATE_NAME:-PetMall}
  PETMALL_SPUG_SMS_CODE_PARAM_NAME: ${PETMALL_SPUG_SMS_CODE_PARAM_NAME:-code}
  PETMALL_SPUG_SMS_TIMEOUT_SECONDS: ${PETMALL_SPUG_SMS_TIMEOUT_SECONDS:-10}
  PETMALL_SMS_CODE_EXPIRE_SECONDS: ${PETMALL_SMS_CODE_EXPIRE_SECONDS:-300}
  PETMALL_SMS_SEND_COOLDOWN_SECONDS: ${PETMALL_SMS_SEND_COOLDOWN_SECONDS:-60}
  PETMALL_SMS_DEBUG_CODE_ENABLED: ${PETMALL_SMS_DEBUG_CODE_ENABLED:-false}

services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    image: petmall-backend:${PETMALL_IMAGE_TAG:-local}
    environment:
      <<: *backend-env
    ports:
      - "${PETMALL_API_PUBLISHED_PORT:-8000}:8000"
    volumes:
      - ../backend/generated:/app/generated
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: petmall-backend:${PETMALL_IMAGE_TAG:-local}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    command: ["python", "-m", "workers.knowledge_worker"]
    environment:
      <<: *backend-env
    volumes:
      - ../backend/generated:/app/generated
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    image: petmall-backend:${PETMALL_IMAGE_TAG:-local}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      <<: *backend-env
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    image: petmall-frontend:${PETMALL_IMAGE_TAG:-local}
    ports:
      - "${PETMALL_FRONTEND_PUBLISHED_PORT:-8080}:80"
    volumes:
      - ../backend/generated:/var/www/petmall/generated:ro
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${PETMALL_MYSQL_DATABASE:-petmall}
      MYSQL_ROOT_PASSWORD: ${PETMALL_MYSQL_ROOT_PASSWORD:-change_me}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${PETMALL_MYSQL_PUBLISHED_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${PETMALL_REDIS_PUBLISHED_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - "${PETMALL_RABBITMQ_PUBLISHED_PORT:-5672}:5672"
      - "${PETMALL_RABBITMQ_MANAGEMENT_PUBLISHED_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.9.6
    profiles: ["rag"]
    ports:
      - "${PETMALL_OLLAMA_PUBLISHED_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    profiles: ["memory"]
    environment:
      POSTGRES_DB: ${PETMALL_POSTGRES_DATABASE:-petmall_agent}
      POSTGRES_USER: ${PETMALL_POSTGRES_USER:-petmall}
      POSTGRES_PASSWORD: ${PETMALL_POSTGRES_PASSWORD:-change_me}
    ports:
      - "${PETMALL_POSTGRES_PUBLISHED_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  ollama_data:
  postgres_data:

networks:
  default:
    name: ${PETMALL_DOCKER_NETWORK:-petmall_network}
    driver: bridge
